# Alembic Configuration File

[alembic]

# Migration scripts directory
script_location = %(here)s/migrations

# Add project directory to Python path
prepend_sys_path = .

# Path separator
path_separator = os

# Database Connection
sqlalchemy.url = mysql+pymysql://root:root@localhost/college_dbs_orm


# Post-write Hooks (Optional)

[post_write_hooks]

# Example:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME


# Logging Configuration

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = simple

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = simple

[formatter_simple]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S